# =====================================================================
# GreengrocerApp — Configuración de la aplicación
# =====================================================================
# Ajustar a la conexión MySQL local. Estos valores se cargan en
# com.greengrocer.config.AppConfig al iniciar la aplicación.
# =====================================================================

db.host=localhost
db.port=3306
db.name=greengrocer_db
db.user=root
db.password=root

# Parámetros opcionales
db.useSSL=false
db.serverTimezone=America/Bogota

# Negocio
# Este archivo se lee como UTF-8 en AppConfig, por eso se admiten tildes.
business.name=Verdulería La Cosecha
business.taxRate=0.19
business.currencySymbol=$
